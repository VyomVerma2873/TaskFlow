services:
  - type: web
    name: taskflow-api
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/task-manager-backend-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
