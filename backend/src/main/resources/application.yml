spring:
  application:
    name: task-manager-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanager?sslmode=require}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-signing-replace-in-production}
  expiration: 86400000  # 24 hours in milliseconds

# Google Gemini API Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:your-gemini-api-key}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.taskmanager: INFO
    org.springframework.security: WARN
